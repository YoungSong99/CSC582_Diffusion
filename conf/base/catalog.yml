# Prepare Data
cleaned_metadata:
  type: pandas.CSVDataset
  filepath: data/03_primary/pokemon_sprites/pokedex.csv

checked_metadata:
  type: pandas.CSVDataset
  filepath: data/03_primary/checked_metadata.csv

encoded_metadata:
  type: pandas.CSVDataset
  filepath: data/04_feature/encoded_metadata.csv

label_mappings:
  type: json.JSONDataset
  filepath: data/04_feature/label_encoders/label_mappings.json

train_metadata:
  type: pandas.CSVDataset
  filepath: data/05_model_input/train_metadata.csv

val_metadata:
  type: pandas.CSVDataset
  filepath: data/05_model_input/val_metadata.csv

test_metadata:
  type: pandas.CSVDataset
  filepath: data/05_model_input/test_metadata.csv

# AE
ae_history:
  type: json.JSONDataset
  filepath: data/07_model_output/ae_history.json

ae_result_img:
  type: kedro_datasets.pillow.ImageDataset
  filepath: data/07_model_output/ae_result_img.png